name: Build

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore SMElevate.Web/SMElevate.Web.csproj

      - name: Build Project
        run: dotnet build SMElevate.Web/SMElevate.Web.csproj --configuration Release --no-restore